<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Center</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="navbar">
        <div style="display: flex; align-items: center;">
            <img src="/static/logo.png" class="nav-logo" onerror="this.style.display='none'">
            <h1>Document Service Center Portal</h1>
        </div>
    </div>
    <div class="container" style="max-width: 500px; margin-top: 4rem;">
        <div class="card">
            <h2 class="card-header">Register New Service Center</h2>
            <form id="reg-center-form">
                <div class="form-group">
                    <label>Official Center Name</label>
                    <input type="text" id="reg-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Admin Email Address</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="reg-pwd" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%;">Create Account</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/" style="color: var(--text-main); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('reg-center-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('name', document.getElementById('reg-name').value);
            fd.append('email', document.getElementById('reg-email').value);
            fd.append('password', document.getElementById('reg-pwd').value);
            
            const res = await fetch('/api/register_center', {method: 'POST', body: fd});
            const data = await res.json();
            alert(data.msg);
            if(data.success) {
                window.location.href = "/";
            }
        });
    </script>
</body>
</html>
